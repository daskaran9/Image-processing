<!DOCTYPE html>
<html>

<head>

<title>OTP Verification</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h2>
Secure Image Access
</h2>

<p>
Image ID:
{{image_id}}
</p>

<form method="POST">

<input
name="otp"
class="form-control mb-3"
placeholder="Enter OTP">

<button
class="btn btn-primary">

Verify OTP

</button>

</form>

</div>

</div>

</body>

</html>

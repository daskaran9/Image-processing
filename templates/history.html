{% extends 'layout.html' %}

{% block title %}
History
{% endblock %}

{% block content %}

<h2>History</h2>

<div class="card p-4">

<table class="table">

<tr>

<th>File</th>

<th>Action</th>

<th>Date</th>

</tr>

{% for row in data %}

<tr>

<td>{{row[0]}}</td>

<td>{{row[1]}}</td>

<td>{{row[2]}}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}

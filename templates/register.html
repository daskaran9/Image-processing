<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
    135deg,
    #2563eb,
    #7c3aed
    );

    font-family:'Segoe UI',sans-serif;
}

.register-card{

    width:500px;

    background:white;

    padding:40px;

    border-radius:25px;

    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.logo{

    text-align:center;

    font-size:50px;

    margin-bottom:10px;
}

.title{

    text-align:center;

    font-weight:700;

    margin-bottom:5px;
}

.subtitle{

    text-align:center;

    color:gray;

    margin-bottom:25px;
}

.form-control{

    border-radius:12px;

    padding:12px;
}

.btn-register{

    width:100%;

    border-radius:12px;

    padding:12px;

    font-weight:bold;
}

.login-link{

    text-align:center;

    margin-top:20px;
}

</style>

</head>

<body>

<div class="register-card">

    <div class="logo">
        🖼️
    </div>

    <h2 class="title">
        Create Account
    </h2>

    <p class="subtitle">
        Secure Image Processing System
    </p>

    <form method="POST">

        <input
        type="text"
        name="fullname"
        class="form-control mb-3"
        placeholder="Full Name"
        required>

        <input
        type="text"
        name="username"
        class="form-control mb-3"
        placeholder="Username"
        required>

        <input
        type="email"
        name="email"
        class="form-control mb-3"
        placeholder="Email"
        required>

        <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="Password"
        required>

        <button
        type="submit"
        class="btn btn-success btn-register">

            Create Account

        </button>

    </form>

    <div class="login-link">

        Already have an account?

        <a href="/login">
            Login
        </a>

    </div>

</div>

</body>

</html>
